<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Verification</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999999;
}

.box{
    width:90%;
    max-width:420px;
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:8px;
    padding:30px;
    text-align:center;
    color:#fff;
}

.box h2{
    color:#ff3b3b;
    margin-top:0;
}

.box p{
    color:#ccc;
    line-height:1.6;
}

.btns{
    display:flex;
    gap:10px;
    margin-top:25px;
}

button{
    flex:1;
    height:48px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.enter{
    background:#ff3333;
    color:#fff;
}

.leave{
    background:#555;
    color:#fff;
}
</style>

</head>
<body>

<div id="overlay">

<div class="box">

<h2>Age Verification</h2>

<p>
This website contains adult content.
You must be at least 18 years old to continue.
</p>

<div class="btns">

<button class="enter" onclick="enterSite()">
Enter
</button>

<button class="leave" onclick="leaveSite()">
Leave
</button>

</div>

</div>

</div>

<script>

const REDIRECT_URL="https://pl28976673.profitablecpmratenetwork.com/bc/9f/be/bc9fbe80adf3bcb8ba2d1d062f4aae20.js";

function enterSite(){

localStorage.setItem("age_verified","yes");

window.location.href=REDIRECT_URL;

}

function leaveSite(){

window.location.href="https://google.com";

}

window.onload=function(){

if(localStorage.getItem("age_verified")=="yes"){

document.getElementById("overlay").style.display="none";

}

}

</script>

</body>
</html>
